# =============================================================================
# Trait Research Regression Tests
# =============================================================================
# Runs tests/test_trait_research_regression.R on every push and PR. The
# suite is self-contained: no API calls, no live cache, ~5s wallclock once
# R is set up. Catches regressions of the bug arc fixed in commits
# 15b27ff (orchestrator NA short-circuit + bind_rows + Run handler wiring),
# 127a695 (ML namespace), 4fe3adb (phylo partial-coverage relatives).
#
# Security: this workflow does not consume any user-supplied event data
# (no github.event.* interpolations, no untrusted PR inputs). Every step
# is either a pinned action or a literal command.
# =============================================================================

name: Regression tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression:
    name: tests/test_trait_research_regression.R
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::dplyr
            any::randomForest

      - name: Run regression tests
        run: Rscript tests/test_trait_research_regression.R
