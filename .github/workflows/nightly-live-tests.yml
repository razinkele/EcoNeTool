# =============================================================================
# Nightly Live Tests
# =============================================================================
# Runs the testthat suite with all live-API gates flipped on so external
# upstream changes (WoRMS, FishBase, SeaLifeBase, OBIS, EcoBase) get caught
# before they cascade into broken deploys. Today's EcoBase HTTPS migration is
# the worked example: the offline fixture suite was 0-fail, but live tests
# would have flagged the redirect on day one.
#
# These tests are network-dependent and slower than the offline suite, so they
# don't run on every push — only nightly on a cron and on manual trigger.
#
# Security: no event data is interpolated into commands; every step is a
# pinned action or a literal command.
# =============================================================================

name: Nightly live tests

on:
  schedule:
    # 04:00 UTC daily — quiet hour in EU/US, low contention with day jobs
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  live-tests:
    name: tests/testthat (RUN_LIVE_TESTS=true)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUN_LIVE_TESTS: "true"
      ECONETOOL_TEST_OBIS_LIVE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.1'
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::testthat
            any::worrms
            any::rfishbase
            any::httr
            any::jsonlite
            any::igraph
            any::dplyr
            any::tidyr
            any::readr
            any::readxl
            any::RCurl
            any::XML
            any::plyr
            any::ape
            any::icesVocab
            any::icesDatras
            any::randomForest
            any::DBI
            any::RSQLite
            any::digest
            any::shiny

      - name: Run live testthat suite (fail on any test failure)
        run: |
          testthat::test_dir(
            "tests/testthat",
            reporter = "summary",
            stop_on_failure = TRUE
          )
        shell: Rscript {0}
