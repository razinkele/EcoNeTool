# Pre-commit hooks for EcoNeTool
# Install: pip install pre-commit && pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate

default_language_version:
  python: python3

# Vendored, third-party and data-fixture trees are not first-party source.
# Excluding them globally keeps the file-hygiene hooks (whitespace, end-of-file,
# line-ending) focused on code we actually maintain, instead of being swamped by
# imported package files (metawebs/ alone is ~120 flagged vendored files).
exclude: |
  (?x)^(
    metawebs/|
    tests/rpath_data/|
    examples/
  )

repos:
  # ==========================================================================
  # General file hygiene
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
        exclude: '\.Rdata$|\.rds$|\.ewemdb$'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']  # Warn on files > 1MB
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.bat$'

  # ==========================================================================
  # Shell script linting
  # ==========================================================================
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.9.0.6
    hooks:
      - id: shellcheck
        args: [--severity=warning, --shell=bash]
        files: \.(sh|bash)$

  # ==========================================================================
  # Repo hygiene checks (custom local hooks)
  # ==========================================================================
  - repo: local
    hooks:
      # Prevent DEBUG prints from being committed.
      # NOTE: pre-commit `language: system` runs the entry via exec, NOT a shell,
      # so &&/||/pipes/$() must be wrapped in `bash -c` or they are passed as
      # literal argv and the hook fails with exit 2 on every run. (In YAML single
      # quotes, '' is a literal single quote.)
      # pass_filenames:false means the global `exclude` above does not reach this
      # grep, so scope out the vendored trees here too.
      - id: no-debug-prints
        name: Check for DEBUG prints
        entry: 'bash -c ''grep -n "DEBUG:" --include="*.R" --include="*.sh" --exclude-dir=metawebs --exclude-dir=rpath_data -r . && exit 1 || exit 0'''
        language: system
        pass_filenames: false
        types: [file]

      # Prevent .Rproj.user from being committed
      - id: no-rproj-user
        name: Check for .Rproj.user files
        entry: 'bash -c ''test -z "$(git ls-files .Rproj.user)" || { echo "ERROR: .Rproj.user files are tracked"; exit 1; }'''
        language: system
        pass_filenames: false

      # Check for large binary files
      - id: no-large-binaries
        name: Check for large binary files
        entry: 'bash -c ''git diff --cached --name-only | grep -E "\.(ewemdb|eweaccdb|zip)$" && echo "WARNING: Binary file staged" && exit 1 || exit 0'''
        language: system
        pass_filenames: false

# ==========================================================================
# R Linting (optional - requires R and lintr package)
# ==========================================================================
# Uncomment below if you have R and lintr installed:
#
#  - repo: https://github.com/lorenzwalthert/precommit
#    rev: v0.4.0
#    hooks:
#      - id: lintr
#        args: [--warn_only]
#      - id: style-files
#        args: [--ignore-start="# styler: off", --ignore-stop="# styler: on"]

# ==========================================================================
# CI/CD Integration Notes
# ==========================================================================
# For GitHub Actions, add this to your workflow:
#
# - name: Run pre-commit
#   uses: pre-commit/action@v3.0.0
#
# Or run manually in CI:
#   pip install pre-commit
#   pre-commit run --all-files
